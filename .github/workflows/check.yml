name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noor-del-conocimiento/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: noor-del-conocimiento/mobile/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run validate:questions
      - run: npm test
